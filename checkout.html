<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Kwa Joe's</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(
        rgba(0,0,0,0.65),
        rgba(0,0,0,0.65)
    ),
    url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #ff6600;
    color: white;
}

/* LAYOUT */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 40px;
    flex-wrap: wrap;
}

/* BOXES */
.box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ORDER ITEMS */
#orderItems p {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}

/* TOTAL */
.total {
    margin-top: 15px;
    font-weight: bold;
    font-size: 18px;
    color: #ff6600;
}

/* FORM */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #e65c00;
}

/* RECEIPT MODAL */
.receipt {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.receipt-box {
    background: white;
    padding: 25px;
    width: 350px;
    border-radius: 15px;
    text-align: center;
}

.receipt.active {
    display: flex;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <h2>Kwa Joe's Checkout</h2>
</div>

<!-- MAIN -->
<div class="container">

    <!-- ORDER SUMMARY -->
    <div class="box">
        <h2>Your Order</h2>
        <div id="orderItems"></div>
        <div class="total">Total: R<span id="total">0</span></div>
    </div>

    <!-- FORM -->
    <div class="box">
        <h2>Customer Details</h2>

        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="phone" placeholder="Phone Number" required>
        <textarea id="address" placeholder="Delivery Address"></textarea>

        <button onclick="placeOrder()">Confirm Order</button>
    </div>

</div>

<!-- RECEIPT -->
<div class="receipt" id="receipt">
    <div class="receipt-box">
        <h2>Order Receipt</h2>
        <p id="receiptText"></p>
        <button onclick="closeReceipt()">Close</button>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* LOAD ORDER */
function loadOrder() {
    let orderItems = document.getElementById("orderItems");
    let totalEl = document.getElementById("total");

    orderItems.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
        total += item.price;
        orderItems.innerHTML += `
            <p>${item.name} <span>R${item.price}</span></p>
        `;
    });

    totalEl.innerText = total;
}
loadOrder();

/* PLACE ORDER */
function placeOrder() {
    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    let name = document.getElementById("name").value;

    if(name === ""){
        alert("Enter your name");
        return;
    }

    let orderNumber = Math.floor(Math.random() * 1000000);

    let total = cart.reduce((sum, item) => sum + item.price, 0);

    document.getElementById("receiptText").innerHTML = `
        <h3>Thank you, ${name}!</h3>
        <p>Order #: ${orderNumber}</p>
        <p>Total Paid: R${total}</p>
        <p>Status: Processing</p>
    `;

    document.getElementById("receipt").classList.add("active");

    localStorage.removeItem("cart");
    cart = [];
}

/* CLOSE RECEIPT */
function closeReceipt(){
    document.getElementById("receipt").classList.remove("active");
}
</script>
<!-- NAV BUTTONS (BOTTOM) -->
<div style="margin-top: 20px; text-align: center; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">

    <!-- NAV BUTTONS (BOTTOM) -->
<div style="margin-top: 20px; text-align: center; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">

    <!-- HOME -->
    <button class="checkout-nav-btn" style="
        width: 180px;
        padding: 12px;
        background: #ee4502;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
    " onclick="window.location.href='index.html'">
         Home
    </button>

    <!-- MENU -->
    <button class="checkout-nav-btn" style="
        width: 180px;
        padding: 12px;
        background: #ee4502;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
    " onclick="window.location.href='menu.html'">
        Menu
    </button>

</div>

</div>
</body>
</html>
